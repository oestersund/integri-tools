<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Braindump">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Braindump – INTEGRI</title>
    <style>
        :root {
            --petrol:       #033132;
            --petrol-bg:    #E8F5F4;
            --terra:        #F08972;
            --waldgruen:    #2D7D3E;
            --waldgruen-bg: #E8F5E9;
            --text:         #2C3E50;
            --muted:        #718096;
            --bg:           #F7F7F5;
            --card:         #FFFFFF;
            --border:       #D1D5D8;
            /* Ampel — klassische Ampelfarben */
            --urgent:       #E53E3E;
            --urgent-bg:    #FFF5F5;
            --important:    #38A169;
            --important-bg: #F0FFF4;
            --normal-col:   #C8920A;
            --normal-bg:    #FFFBEA;
            /* Privat */
            --private-col:  #8B6914;
            --private-bg:   #FFF5E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 60px;
            font-size: 16px;
            line-height: 1.5;
        }

        /* =============================================
           TOP BLOCK — sticky
        ============================================= */
        .top-block {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card);
            box-shadow: 0 2px 8px rgba(3,49,50,0.10);
        }

        /* Logo bar — centered layout */
        .logo-bar {
            display: flex;
            align-items: center;
            padding: 10px 14px 9px;
            border-bottom: 1px solid var(--border);
            background: var(--petrol);
            position: relative;
        }

        .logo-bar-center {
            flex: 1;
            text-align: center;
        }

        .logo-bar .logo {
            font-size: 16px;
            font-weight: 700;
            color: white;
            letter-spacing: 3px;
        }

        .logo-bar .app-name {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Filter-Dropdowns in der Logo-Bar */
        .logo-filter-wrap {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-shrink: 0;
        }

        .logo-filter-wrap select {
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 5px;
            background: rgba(255,255,255,0.10);
            font-size: 13px;
            font-family: inherit;
            color: rgba(255,255,255,0.88);
            cursor: pointer;
            padding: 4px 6px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        .logo-filter-wrap select:focus { border-color: rgba(255,255,255,0.55); }
        .logo-filter-wrap select option { background: var(--petrol); color: white; }

        /* Capture area */
        .capture-area {
            padding: 14px 14px 18px;
            border-bottom: 3px solid var(--border);
            background: var(--card);
        }

        .capture-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* Context toggle */
        .context-toggle {
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            border: 1.5px solid var(--border);
        }

        .context-toggle button {
            padding: 6px 10px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: var(--card);
            font-family: inherit;
            color: var(--muted);
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .context-toggle button:hover:not(.active-arbeit):not(.active-priv) {
            background: var(--bg);
            color: var(--text);
        }

        .context-toggle button.active-arbeit {
            background: var(--petrol);
            color: white;
        }

        .context-toggle button.active-priv {
            background: var(--private-bg);
            color: var(--private-col);
            font-weight: 600;
        }

        /* Priority circles — Ampel — order: Grün, Gelb, Rot */
        .priority-pills {
            display: flex;
            gap: 6px;
            margin-left: auto;
            align-items: center;
        }

        .priority-pills button {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .priority-pills button:hover { filter: brightness(0.88); }
        .priority-pills button:active { transform: scale(0.92); }

        /* Inactive: subtle tint */
        #prio-important { background: #C6F6D5; border-color: #68D391; }
        #prio-normal    { background: #FEFCBF; border-color: #F6E05E; }
        #prio-urgent    { background: #FED7D7; border-color: #FC8181; }

        /* Active: klassische Ampelfarben voll gesättigt */
        #prio-important.active-important { background: var(--important); border-color: var(--important); }
        #prio-normal.active-normal       { background: #D69E2E; border-color: #B7791F; }
        #prio-urgent.active-urgent       { background: var(--urgent); border-color: var(--urgent); }

        /* Capture input row */
        .capture-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #entry-input {
            flex: 1;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 17px;
            font-family: inherit;
            resize: none;
            min-height: 80px;
            max-height: 200px;
            line-height: 1.5;
            overflow-y: auto;
            color: var(--text);
            background: var(--bg);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
        }

        #entry-input:focus {
            outline: none;
            border-color: var(--petrol);
            background: var(--card);
            box-shadow: 0 0 0 3px rgba(3,49,50,0.08), inset 0 1px 3px rgba(0,0,0,0.04);
        }

        #submit-btn {
            width: 52px;
            height: 52px;
            background: var(--terra);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: inherit;
            align-self: flex-end;
        }

        #submit-btn:active { filter: brightness(0.85); }

        /* Nav tabs */
        nav {
            display: flex;
            border-top: 1px solid var(--border);
            align-items: stretch;
        }

        nav button {
            flex: 1;
            padding: 8px 2px;
            border: none;
            background: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            font-family: inherit;
            white-space: nowrap;
        }

        nav button:hover { color: var(--petrol); background: rgba(3,49,50,0.04); }
        nav button:active { background: rgba(3,49,50,0.08); }

        nav button.active {
            color: var(--petrol);
            border-bottom-color: var(--terra);
            font-weight: 600;
        }

        .nav-badge {
            display: inline-block;
            background: var(--terra);
            color: white;
            border-radius: 10px;
            font-size: 10px;
            padding: 1px 5px;
            margin-left: 3px;
            vertical-align: middle;
        }

        /* Settings-Button im Nav — Icon-only, rechtsbündig */
        nav button.nav-settings {
            flex: 0 0 auto;
            padding: 8px 12px;
            font-size: 16px;
            border-left: 1px solid var(--border);
            color: var(--muted);
        }

        /* =============================================
           MAIN CONTENT
        ============================================= */
        main {
            padding: 14px 14px 0;
            max-width: 600px;
            margin: 0 auto;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* ---- CARDS ---- */
        .entry-card {
            background: var(--card);
            border-radius: 8px;
            padding: 13px 15px;
            margin-bottom: 10px;
            box-shadow: 0 1px 3px rgba(3,49,50,0.08);
            border-left: 4px solid var(--border);
        }

        .entry-card.priority-urgent    { border-left-color: var(--urgent); }
        .entry-card.priority-important { border-left-color: var(--important); }
        .entry-card.priority-normal    { border-left-color: #D4A017; }
        /* done-dimming only in inbox/heute, not in archiv */
        .entry-card.is-done { opacity: 0.45; }
        .no-dim .entry-card.is-done { opacity: 1; }

        .entry-card.impulse-card {
            background: var(--waldgruen-bg);
            border: 1px solid #A9D9B0;
            border-left: 4px solid var(--waldgruen);
        }

        .impulse-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--waldgruen);
            margin-bottom: 6px;
        }

        .entry-meta {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 7px;
            align-items: center;
        }

        .badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge-arbeit    { background: var(--petrol-bg); color: var(--petrol); }
        .badge-priv      { background: var(--private-bg); color: var(--private-col); }
        .badge-urgent    { background: var(--urgent-bg); color: var(--urgent); }
        .badge-important { background: var(--important-bg); color: var(--important); }
        .badge-normal    { background: var(--normal-bg); color: var(--normal-col); }
        .badge-done      { background: #EDF2F7; color: var(--muted); }
        .badge-tag       { background: var(--waldgruen-bg); color: var(--waldgruen); }
        .badge-tagging   { background: #F7F7F5; color: #aaa; font-style: italic; }

        .entry-text {
            font-size: 17px;
            line-height: 1.55;
            word-break: break-word;
            color: var(--text);
        }

        .entry-text a { color: var(--waldgruen); text-decoration: none; }

        .entry-date {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .entry-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-sm {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            background: var(--card);
            color: var(--text);
            transition: filter 0.15s, background 0.15s, color 0.15s;
        }
        .btn-sm:hover  { filter: brightness(0.94); }
        .btn-sm:active { filter: brightness(0.84); transform: scale(0.97); }

        .btn-done           { border-color: var(--waldgruen); color: var(--waldgruen); }
        .btn-done:hover     { background: var(--waldgruen); color: white; }
        .btn-restore        { border-color: var(--petrol); color: var(--petrol); }
        .btn-restore:hover  { background: var(--petrol); color: white; }
        .btn-undo           { border-color: var(--border); color: var(--muted); }
        .btn-prio-urgent    { border-color: var(--urgent); color: var(--urgent); }
        .btn-prio-important { border-color: var(--important); color: var(--important); }
        .btn-prio-normal    { border-color: #D4A017; color: var(--normal-col); }

        .btn-delete {
            border-color: var(--border);
            color: var(--muted);
            margin-left: auto;
        }
        .btn-delete:hover  { border-color: var(--urgent); color: var(--urgent); filter: none; background: var(--urgent-bg); }
        .btn-delete:active { filter: brightness(0.9); }

        /* Delete confirmation inline */
        .delete-confirm-label {
            font-size: 13px;
            color: var(--urgent);
            font-weight: 500;
            align-self: center;
        }

        .btn-delete-yes {
            background: var(--urgent);
            color: white;
            border-color: var(--urgent);
        }
        .btn-delete-yes:hover { filter: brightness(0.9); }

        /* ---- SECTION HEADERS ---- */
        .section-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
            margin: 18px 0 8px;
        }
        .section-header:first-child { margin-top: 2px; }

        .empty-state {
            text-align: center;
            color: #bbb;
            font-size: 15px;
            padding: 36px 0;
        }

        /* ---- ARCHIV FILTERS ---- */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .filter-bar input,
        .filter-bar select {
            flex: 1;
            min-width: 110px;
            padding: 9px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: var(--card);
            color: var(--text);
        }

        .filter-bar input:focus,
        .filter-bar select:focus { outline: none; border-color: var(--petrol); }

        /* ---- SETTINGS ---- */
        .settings-section {
            background: var(--card);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: 0 1px 3px rgba(3,49,50,0.07);
        }

        .settings-section h3 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .settings-section input[type="text"],
        .settings-section input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 8px;
            color: var(--text);
            background: var(--bg);
        }

        .settings-section input:focus { outline: none; border-color: var(--petrol); }

        .settings-hint {
            font-size: 13px;
            color: #aaa;
            margin-top: 6px;
            line-height: 1.45;
        }

        .btn-primary {
            background: var(--terra);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary:active { filter: brightness(0.9); }

        .btn-secondary {
            background: transparent;
            color: var(--petrol);
            border: 1.5px solid var(--petrol);
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-secondary:active { background: var(--petrol); color: white; }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--waldgruen-bg);
            color: var(--waldgruen);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag-chip button {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            opacity: 0.5;
        }

        .tag-chip button:hover { opacity: 1; }

        .add-tag-row {
            display: flex;
            gap: 8px;
        }

        .add-tag-row input {
            flex: 1;
            padding: 9px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
        }

        .add-tag-row input:focus { outline: none; border-color: var(--petrol); }

        /* ---- TOAST ---- */
        .toast {
            position: fixed;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--petrol);
            color: white;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="top-block">

    <div class="logo-bar">
        <div class="logo-bar-center">
            <span class="logo">INTEGRI</span>
        </div>
        <div class="logo-filter-wrap">
            <select id="nav-filter-ctx" onchange="refreshAll()" title="Kontext filtern">
                <option value="">Alle</option>
                <option value="arbeit">🔵 Arbeit</option>
                <option value="private">🟤 Privat</option>
            </select>
            <select id="nav-filter-prio" onchange="refreshAll()" title="Priorität filtern">
                <option value="">Alle Prio</option>
                <option value="urgent">🔴 Dringend</option>
                <option value="important">🟢 Wichtig</option>
                <option value="normal">🟡 Normal</option>
            </select>
        </div>
    </div>

    <div class="capture-area">
        <div class="capture-controls">
            <div class="context-toggle">
                <button id="btn-arbeit" class="active-arbeit" onclick="setContext('arbeit')">🔵 Arbeit</button>
                <button id="btn-priv" onclick="setContext('private')">🟤 Privat</button>
            </div>
            <!-- Ampel order: Grün → Gelb → Rot. Default = Grün (important) -->
            <div class="priority-pills">
                <button id="prio-important" class="active-important" onclick="setPriority('important')" title="Wichtig" aria-label="Wichtig"></button>
                <button id="prio-normal" onclick="setPriority('normal')" title="Normal" aria-label="Normal"></button>
                <button id="prio-urgent" onclick="setPriority('urgent')" title="Dringend" aria-label="Dringend"></button>
            </div>
        </div>
        <div class="capture-row">
            <textarea id="entry-input"
                placeholder="Gedanke, Aufgabe, URL, Zitat..."
                rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button id="submit-btn" onclick="submitEntry()">↑</button>
        </div>
    </div>

    <nav>
        <button id="nav-heute" onclick="showView('heute')">☀️ Heute</button>
        <button id="nav-inbox" class="active" onclick="showView('inbox')">📥 Inbox <span class="nav-badge" id="inbox-badge">0</span></button>
        <button id="nav-archiv" onclick="showView('archiv')">📦 Archiv</button>
        <button id="nav-settings" class="nav-settings" onclick="showView('settings')" title="Einstellungen">⚙️</button>
    </nav>

</div>

<main>

    <div class="view" id="view-heute">
        <div id="heute-urgent"></div>
        <div id="heute-important"></div>
    </div>

    <div class="view active" id="view-inbox">
        <div id="inbox-list"></div>
    </div>

    <div class="view" id="view-archiv">
        <div class="filter-bar">
            <input type="text" id="f-search" placeholder="Suche..." oninput="renderArchiv()">
            <select id="f-context" onchange="renderArchiv()">
                <option value="">Alle Kontexte</option>
                <option value="arbeit">🔵 Arbeit</option>
                <option value="private">🟤 Privat</option>
            </select>
            <select id="f-priority" onchange="renderArchiv()">
                <option value="">Alle Prioritäten</option>
                <option value="urgent">🔴 Dringend</option>
                <option value="important">🟢 Wichtig</option>
                <option value="normal">🟡 Normal</option>
            </select>
            <select id="f-tag" onchange="renderArchiv()">
                <option value="">Alle Tags</option>
            </select>
        </div>
        <!-- no-dim class disables opacity on done cards in archiv -->
        <div id="archiv-list" class="no-dim"></div>
    </div>

    <div class="view" id="view-settings">
        <div class="settings-section">
            <h3>Cowork Sync</h3>
            <button class="btn-primary" onclick="syncToWorkspace()">⬆ Sync zu Cowork</button>
            <p class="settings-hint" id="sync-hint">Schreibt <code>braindump-sync.json</code> direkt in deinen Claude_Workspace-Ordner. Beim ersten Mal Ordner auswählen.</p>
        </div>
        <div class="settings-section">
            <h3>Claude API Key</h3>
            <input type="password" id="api-key-input" placeholder="sk-ant-api03-...">
            <button class="btn-primary" onclick="saveApiKey()">Speichern</button>
            <p class="settings-hint">Lokal gespeichert. Aktiviert Auto-Tagging via Claude Haiku nach dem Speichern eines Eintrags.</p>
        </div>
        <div class="settings-section">
            <h3>Tags</h3>
            <div class="tag-list" id="tag-list"></div>
            <div class="add-tag-row">
                <input type="text" id="new-tag-input" placeholder="Neuer Tag..."
                    onkeydown="if(event.key==='Enter') addTag()">
                <button class="btn-primary" onclick="addTag()">+</button>
            </div>
        </div>
        <div class="settings-section">
            <h3>Daten</h3>
            <button class="btn-secondary" onclick="exportData()">JSON exportieren</button>
        </div>
    </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
var db = null;
var currentView = 'inbox';
var ctx = 'arbeit';
var prio = 'important'; // default = Grün

var DEFAULT_TAGS = ['Content-Idee', 'Aufgabe', 'Zitat', 'Link', 'Referenz', 'Inspiration', 'Notiz'];

function getTags() {
    try {
        var s = localStorage.getItem('bd_tags');
        return s ? JSON.parse(s) : DEFAULT_TAGS.slice();
    } catch (e) {
        return DEFAULT_TAGS.slice();
    }
}

function saveTags(tags) {
    localStorage.setItem('bd_tags', JSON.stringify(tags));
}

function getApiKey() {
    return localStorage.getItem('bd_api_key') || '';
}

function getNavFilterCtx() {
    var el = document.getElementById('nav-filter-ctx');
    return el ? el.value : '';
}

function getNavFilterPrio() {
    var el = document.getElementById('nav-filter-prio');
    return el ? el.value : '';
}

// ============================================================
// INDEXEDDB
// ============================================================
function initDB() {
    return new Promise(function(resolve, reject) {
        var req = indexedDB.open('braindump_db', 1);
        req.onupgradeneeded = function(e) {
            var database = e.target.result;
            if (!database.objectStoreNames.contains('entries')) {
                var store = database.createObjectStore('entries', { keyPath: 'id', autoIncrement: true });
                store.createIndex('done', 'done', { unique: false });
                store.createIndex('priority', 'priority', { unique: false });
                store.createIndex('createdAt', 'createdAt', { unique: false });
            }
        };
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function() { reject(req.error); };
    });
}

function dbAdd(entry) {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction('entries', 'readwrite');
        var req = tx.objectStore('entries').add(entry);
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
    });
}

function dbUpdate(id, updates) {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction('entries', 'readwrite');
        var store = tx.objectStore('entries');
        var getReq = store.get(id);
        getReq.onsuccess = function() {
            var entry = Object.assign({}, getReq.result, updates);
            var putReq = store.put(entry);
            putReq.onsuccess = function() { resolve(); };
            putReq.onerror = function() { reject(putReq.error); };
        };
        getReq.onerror = function() { reject(getReq.error); };
    });
}

function dbDelete(id) {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction('entries', 'readwrite');
        var req = tx.objectStore('entries').delete(id);
        req.onsuccess = function() { resolve(); };
        req.onerror = function() { reject(req.error); };
    });
}

function dbGetAll() {
    return new Promise(function(resolve, reject) {
        var tx = db.transaction('entries', 'readonly');
        var req = tx.objectStore('entries').getAll();
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
    });
}

// ============================================================
// AUTO-TAGGING
// ============================================================
async function autoTag(id, text) {
    var apiKey = getApiKey();
    if (!apiKey) return;
    var tags = getTags();
    try {
        var resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 60,
                messages: [{
                    role: 'user',
                    content: 'Welche dieser Tags passen zum folgenden Text? Tags: ' + tags.join(', ') + '. Antworte NUR mit kommaseparierter Liste passender Tags. Wenn kein Tag passt: "keine". Text: "' + text.replace(/"/g, "'") + '"'
                }]
            })
        });
        if (!resp.ok) { await dbUpdate(id, { tagging: false }); refreshAll(); return; }
        var data = await resp.json();
        var raw = data.content[0].text.trim();
        var assigned = [];
        if (raw.toLowerCase() !== 'keine') {
            assigned = raw.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return tags.indexOf(t) !== -1; });
        }
        await dbUpdate(id, { tags: assigned, tagging: false });
        refreshAll();
    } catch (e) {
        await dbUpdate(id, { tagging: false });
        refreshAll();
    }
}

// ============================================================
// INPUT
// ============================================================
function setContext(c) {
    ctx = c;
    document.getElementById('btn-arbeit').className = c === 'arbeit' ? 'active-arbeit' : '';
    document.getElementById('btn-priv').className = c === 'private' ? 'active-priv' : '';
}

function setPriority(p) {
    prio = p;
    document.getElementById('prio-important').className = p === 'important' ? 'active-important' : '';
    document.getElementById('prio-normal').className = p === 'normal' ? 'active-normal' : '';
    document.getElementById('prio-urgent').className = p === 'urgent' ? 'active-urgent' : '';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitEntry(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

async function submitEntry() {
    var input = document.getElementById('entry-input');
    var text = input.value.trim();
    if (!text) return;
    var hasKey = !!getApiKey();
    var entry = { text: text, context: ctx, priority: prio, tags: [], tagging: hasKey, done: false, createdAt: Date.now() };
    var id = await dbAdd(entry);
    input.value = '';
    input.style.height = 'auto';
    input.focus();
    setPriority('important'); // reset to default Grün
    refreshAll();
    showToast('Gespeichert');
    if (hasKey) { autoTag(id, text); }
}

// ============================================================
// NAV FILTER helper
// ============================================================
function matchesNavFilter(entry) {
    var fc = getNavFilterCtx();
    var fp = getNavFilterPrio();
    if (fc) {
        if (fc === 'arbeit' && entry.context !== 'arbeit' && entry.context !== 'professional') return false;
        if (fc === 'private' && entry.context !== 'private') return false;
    }
    if (fp && entry.priority !== fp) return false;
    return true;
}

// ============================================================
// CARD RENDERING
// ============================================================
function formatDate(ts) {
    var d = new Date(ts);
    var now = new Date();
    if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function linkify(text) {
    return text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
        return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>';
    });
}

function buildCard(entry, opts) {
    opts = opts || {};

    var prioClass    = 'priority-' + entry.priority;
    var doneClass    = entry.done ? 'is-done' : '';
    var impulseClass = opts.impulse ? 'impulse-card' : '';

    var ctxBadge = (entry.context === 'arbeit' || entry.context === 'professional')
        ? '<span class="badge badge-arbeit">🔵 Arbeit</span>'
        : '<span class="badge badge-priv">🟤 Privat</span>';

    var prioBadge = entry.priority === 'urgent'
        ? '<span class="badge badge-urgent">🔴 Dringend</span>'
        : entry.priority === 'important'
            ? '<span class="badge badge-important">🟢 Wichtig</span>'
            : '<span class="badge badge-normal">🟡 Normal</span>';

    var doneBadge = (opts.archivView && entry.done)
        ? '<span class="badge badge-done">✓ Erledigt</span>'
        : '';

    var tagHtml = entry.tagging
        ? '<span class="badge badge-tagging">⏳ wird getaggt…</span>'
        : (entry.tags || []).map(function(t) { return '<span class="badge badge-tag">' + t + '</span>'; }).join('');

    var actions = '';
    if (opts.actions !== false) {
        if (opts.archivView) {
            // Archiv: Wiederherstellen + Löschen
            actions = '<div class="entry-actions">'
                + '<button class="btn-sm btn-restore" onclick="doUndoDone(' + entry.id + ')">↩ Wiederherstellen</button>'
                + '<button class="btn-sm btn-delete" id="del-' + entry.id + '" onclick="doDeleteClick(' + entry.id + ')">✕ Löschen</button>'
                + '</div>';
        } else {
            var doneBtn = !entry.done
                ? '<button class="btn-sm btn-done" onclick="doMarkDone(' + entry.id + ')">✓ Erledigt</button>'
                : '<button class="btn-sm btn-undo" onclick="doUndoDone(' + entry.id + ')">↩ Rückgängig</button>';
            var prioBtn = '';
            if (entry.priority !== 'urgent')    prioBtn += '<button class="btn-sm btn-prio-urgent" onclick="doChangePrio(' + entry.id + ',\'urgent\')">Dringend</button>';
            if (entry.priority !== 'important') prioBtn += '<button class="btn-sm btn-prio-important" onclick="doChangePrio(' + entry.id + ',\'important\')">Wichtig</button>';
            if (entry.priority !== 'normal')    prioBtn += '<button class="btn-sm btn-prio-normal" onclick="doChangePrio(' + entry.id + ',\'normal\')">Normal</button>';
            actions = '<div class="entry-actions">'
                + doneBtn + prioBtn
                + '<button class="btn-sm btn-delete" id="del-' + entry.id + '" onclick="doDeleteClick(' + entry.id + ')">✕ Löschen</button>'
                + '</div>';
        }
    }

    var impulseLine = opts.impulse ? '<div class="impulse-label">💡 Impuls aus dem Archiv</div>' : '';

    return '<div class="entry-card ' + prioClass + ' ' + doneClass + ' ' + impulseClass + '" id="card-' + entry.id + '">'
        + impulseLine
        + '<div class="entry-meta">' + ctxBadge + prioBadge + doneBadge + tagHtml + '</div>'
        + '<div class="entry-text">' + linkify(entry.text) + '</div>'
        + '<div class="entry-date">' + formatDate(entry.createdAt) + '</div>'
        + actions
        + '</div>';
}

// ============================================================
// DELETE — inline confirmation, no timer state needed
// ============================================================
function doDeleteClick(id) {
    var actionsEl = document.querySelector('#card-' + id + ' .entry-actions');
    if (!actionsEl) return;
    actionsEl.innerHTML =
        '<span class="delete-confirm-label">Wirklich löschen?</span>'
        + '<button class="btn-sm btn-delete-yes" onclick="doDeleteConfirmed(' + id + ')">Löschen</button>'
        + '<button class="btn-sm" onclick="refreshAll()">Abbrechen</button>';
}

async function doDeleteConfirmed(id) {
    await dbDelete(id);
    refreshAll();
    showToast('Gelöscht');
}

// ============================================================
// HEUTE VIEW
// ============================================================
async function renderHeute() {
    var entries = await dbGetAll();
    var active = entries.filter(function(e) { return !e.done && matchesNavFilter(e); });

    var urgent = active.filter(function(e) { return e.priority === 'urgent'; });
    var important = active
        .filter(function(e) { return e.priority === 'important'; })
        .sort(function(a, b) { return a.createdAt - b.createdAt; })
        .slice(0, 3);

    var urgentEl    = document.getElementById('heute-urgent');
    var importantEl = document.getElementById('heute-important');

    urgentEl.innerHTML = urgent.length > 0
        ? '<div class="section-header">Dringend</div>' + urgent.map(function(e) { return buildCard(e); }).join('')
        : '';

    importantEl.innerHTML = important.length > 0
        ? '<div class="section-header">Wichtig</div>' + important.map(function(e) { return buildCard(e); }).join('')
        : '';

    if (urgent.length === 0 && important.length === 0) {
        urgentEl.innerHTML = '<div class="empty-state">Nichts Dringendes. Guter Start.</div>';
    }
}

// ============================================================
// INBOX VIEW
// ============================================================
async function renderInbox() {
    var entries = await dbGetAll();
    var inbox = entries
        .filter(function(e) { return !e.done && matchesNavFilter(e); })
        .sort(function(a, b) { return b.createdAt - a.createdAt; });

    document.getElementById('inbox-badge').textContent = entries.filter(function(e) { return !e.done; }).length;

    var el = document.getElementById('inbox-list');
    el.innerHTML = inbox.length === 0
        ? '<div class="empty-state">Inbox leer.</div>'
        : inbox.map(function(e) { return buildCard(e); }).join('');
}

// ============================================================
// ARCHIV VIEW — zeigt nur erledigte Einträge
// ============================================================
async function renderArchiv() {
    var entries = await dbGetAll();

    var search     = document.getElementById('f-search').value.toLowerCase();
    var ctxFilter  = document.getElementById('f-context').value;
    var prioFilter = document.getElementById('f-priority').value;

    var tagSelect = document.getElementById('f-tag');
    var prevTag   = tagSelect.value;
    var allTags   = [];
    entries.forEach(function(e) {
        (e.tags || []).forEach(function(t) { if (allTags.indexOf(t) === -1) allTags.push(t); });
    });
    allTags.sort();
    tagSelect.innerHTML = '<option value="">Alle Tags</option>'
        + allTags.map(function(t) { return '<option value="' + t + '"' + (t === prevTag ? ' selected' : '') + '>' + t + '</option>'; }).join('');
    var tagFilter = tagSelect.value;

    var filtered = entries
        .filter(function(e) { return e.done; }) // nur erledigte
        .filter(function(e) {
            if (!ctxFilter) return true;
            if (ctxFilter === 'arbeit') return e.context === 'arbeit' || e.context === 'professional';
            return e.context === ctxFilter;
        })
        .filter(function(e) { return !search     || e.text.toLowerCase().indexOf(search) !== -1; })
        .filter(function(e) { return !prioFilter || e.priority === prioFilter; })
        .filter(function(e) { return !tagFilter  || (e.tags || []).indexOf(tagFilter) !== -1; })
        .sort(function(a, b) { return b.createdAt - a.createdAt; });

    var el = document.getElementById('archiv-list');
    el.innerHTML = filtered.length === 0
        ? '<div class="empty-state">Keine erledigten Einträge.</div>'
        : filtered.map(function(e) { return buildCard(e, { archivView: true }); }).join('');
}

// ============================================================
// ACTIONS
// ============================================================
async function doMarkDone(id) {
    await dbUpdate(id, { done: true });
    refreshAll();
    showToast('Erledigt ✓');
}

async function doUndoDone(id) {
    await dbUpdate(id, { done: false });
    refreshAll();
    showToast('Wiederhergestellt');
}

async function doChangePrio(id, p) {
    await dbUpdate(id, { priority: p });
    refreshAll();
}

// ============================================================
// SETTINGS
// ============================================================
function saveApiKey() {
    var key = document.getElementById('api-key-input').value.trim();
    localStorage.setItem('bd_api_key', key);
    showToast('API Key gespeichert');
}

function renderTagSettings() {
    var tags = getTags();
    document.getElementById('tag-list').innerHTML = tags.map(function(tag) {
        var escaped = tag.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        return '<div class="tag-chip">' + tag + '<button onclick="removeTag(\'' + escaped + '\')">✕</button></div>';
    }).join('');
}

function addTag() {
    var input = document.getElementById('new-tag-input');
    var tag = input.value.trim();
    if (!tag) return;
    var tags = getTags();
    if (tags.indexOf(tag) === -1) { tags.push(tag); saveTags(tags); renderTagSettings(); }
    input.value = '';
}

function removeTag(tag) {
    saveTags(getTags().filter(function(t) { return t !== tag; }));
    renderTagSettings();
}

// ============================================================
// EXPORT
// ============================================================
async function exportData() {
    var entries = await dbGetAll();
    var blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'braindump-' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function showView(v) {
    currentView = v;
    document.querySelectorAll('.view').forEach(function(el) { el.classList.remove('active'); });
    document.querySelectorAll('nav button').forEach(function(el) { el.classList.remove('active'); });
    document.getElementById('view-' + v).classList.add('active');
    var navBtn = document.getElementById('nav-' + v);
    if (navBtn) navBtn.classList.add('active');
    if (v === 'heute')   renderHeute();
    if (v === 'inbox')   renderInbox();
    if (v === 'archiv')  renderArchiv();
    if (v === 'settings') {
        renderTagSettings();
        document.getElementById('api-key-input').value = getApiKey();
    }
}

function refreshAll() {
    if (currentView === 'heute')  renderHeute();
    if (currentView === 'inbox')  renderInbox();
    if (currentView === 'archiv') renderArchiv();
    dbGetAll().then(function(entries) {
        document.getElementById('inbox-badge').textContent = entries.filter(function(e) { return !e.done; }).length;
    });
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ============================================================
// WORKSPACE SYNC
// ============================================================
var settingsDb = null;

async function initSettingsDB() {
    if (settingsDb) return settingsDb;
    return new Promise(function(resolve, reject) {
        var req = indexedDB.open('braindump_settings', 1);
        req.onupgradeneeded = function(e) {
            e.target.result.createObjectStore('settings', { keyPath: 'key' });
        };
        req.onsuccess = function(e) { settingsDb = e.target.result; resolve(settingsDb); };
        req.onerror = function() { reject(req.error); };
    });
}

async function getSyncDirHandle() {
    await initSettingsDB();
    return new Promise(function(resolve) {
        var tx = settingsDb.transaction('settings', 'readonly');
        var req = tx.objectStore('settings').get('syncDir');
        req.onsuccess = function() { resolve(req.result ? req.result.handle : null); };
        req.onerror = function() { resolve(null); };
    });
}

async function saveSyncDirHandle(handle) {
    await initSettingsDB();
    return new Promise(function(resolve) {
        var tx = settingsDb.transaction('settings', 'readwrite');
        tx.objectStore('settings').put({ key: 'syncDir', handle: handle });
        tx.oncomplete = resolve;
    });
}

async function syncToWorkspace() {
    var entries = await dbGetAll();
    var lastSync = localStorage.getItem('bd_last_sync') || null;
    var payload = JSON.stringify({
        exported: new Date().toISOString(),
        lastSync: lastSync,
        entries: entries
    }, null, 2);

    // File System Access API (Chrome/Edge Desktop)
    if ('showDirectoryPicker' in window) {
        try {
            var dirHandle = await getSyncDirHandle();

            if (dirHandle) {
                var perm = await dirHandle.queryPermission({ mode: 'readwrite' });
                if (perm !== 'granted') perm = await dirHandle.requestPermission({ mode: 'readwrite' });
                if (perm !== 'granted') dirHandle = null;
            }

            if (!dirHandle) {
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                await saveSyncDirHandle(dirHandle);
            }

            var fileHandle = await dirHandle.getFileHandle('braindump-sync.json', { create: true });
            var writable = await fileHandle.createWritable();
            await writable.write(payload);
            await writable.close();

            localStorage.setItem('bd_last_sync', new Date().toISOString());
            document.getElementById('sync-hint').textContent = 'Letzter Sync: ' + new Date().toLocaleString('de-DE');
            showToast('Sync ✓');
            return;
        } catch(e) {
            if (e.name === 'AbortError') return; // Nutzer hat abgebrochen
            // Bei anderen Fehlern: Fallback auf Download
        }
    }

    // Fallback: normaler Download (iPhone / Safari)
    var blob = new Blob([payload], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'braindump-sync.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem('bd_last_sync', new Date().toISOString());
    showToast('Exportiert — Datei in Claude_Workspace speichern');
}

// ============================================================
// INIT
// ============================================================
async function init() {
    db = await initDB();
    showView('inbox');
    document.getElementById('entry-input').focus();
    // Letzten Sync-Zeitpunkt anzeigen
    var lastSync = localStorage.getItem('bd_last_sync');
    if (lastSync) {
        var hint = document.getElementById('sync-hint');
        if (hint) hint.textContent = 'Letzter Sync: ' + new Date(lastSync).toLocaleString('de-DE');
    }
}

init();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function() {});
    });
}
